syntax = "proto3";

package fx.events;

import "event_header.proto";

enum StrategyId {
  STRATEGY_ID_UNSPECIFIED = 0;
  STRATEGY_A = 1;
  STRATEGY_B = 2;
  STRATEGY_C = 3;
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  BUY = 1;
  SELL = 2;
  HOLD = 3;
}

enum TradeDecision {
  TRADE_DECISION_UNSPECIFIED = 0;
  EXECUTE = 1;
  SKIP = 2;
}

message DecisionEventPayload {
  EventHeader header = 1;

  StrategyId strategy_id = 10;
  ActionType action = 11;
  uint64 lots = 12;
  TradeDecision decision = 13;

  // Feature vector (flattened)
  repeated double feature_vector = 20;

  // Q-value estimates
  double q_buy = 21;
  double q_sell = 22;
  double q_hold = 23;
  double q_selected = 24;

  // Thompson Sampling statistics
  double posterior_mean = 30;
  double posterior_std = 31;
  double sampled_q = 32;

  // Position state at decision time
  double position_size = 40;
  double entry_price = 41;
  double pnl_unrealized = 42;
  double holding_time_ms = 43;

  // Risk context
  double staleness_ms = 50;
  double lot_multiplier = 51;
  double daily_pnl = 52;

  // Regime information
  repeated double regime_posterior = 60;
  double regime_entropy = 61;

  // Skip reason (if decision == SKIP)
  string skip_reason = 70;

  // Runtime-parity diagnostics (design.md §8.1-compatible additions)
  repeated double q_tilde_final_values = 71;
  double q_point_selected = 72;
  double q_tilde_selected = 73;
  double sigma_model = 74;
  double sigma_execution = 75;
  double sigma_latency = 76;
  double sigma_non_model = 77;
  double dynamic_k = 78;
  double position_before = 79;
  double position_after = 80;
  double position_max_limit = 81;
  double velocity_limit = 82;
  double dynamic_cost = 83;
  double latency_penalty = 84;
}
